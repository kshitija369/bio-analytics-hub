<div id="provenance-xray" class="mt-6 p-4 bg-zinc-900 border border-zinc-800 rounded-lg animate-in fade-in slide-in-from-top-4 duration-300">
    <div class="flex justify-between items-center mb-4">
        <h3 class="font-mono text-xs uppercase tracking-widest text-zinc-500">Agent Decision Trace (X-RAY)</h3>
        <button onclick="this.closest('#provenance-xray').remove()" class="text-zinc-600 hover:text-zinc-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>
    
    <div class="space-y-4">
        <div>
            <span class="font-mono text-xs text-amber-500/70">AGENT_ID:</span>
            <span class="font-mono text-xs text-zinc-300">{{ provenance.agent_id }}</span>
        </div>
        
        <div>
            <span class="font-mono text-xs text-amber-500/70">INPUT_METRICS:</span>
            <div class="grid grid-cols-1 gap-1 mt-1 pl-4 border-l border-zinc-800">
                {% for key, val in provenance.input_metrics.items() %}
                <div class="font-mono text-xs">
                    <span class="text-zinc-500">{{ key }}:</span>
                    <span class="text-zinc-400">{{ val }}</span>
                </div>
                {% endfor %}
            </div>
        </div>

        <div>
            <span class="font-mono text-xs text-amber-500/70">CHAIN_OF_THOUGHT:</span>
            <div class="mt-1 pl-4 border-l border-zinc-800 space-y-1">
                {% for step in provenance.chain_of_thought %}
                <div class="font-mono text-xs text-zinc-400">
                    <span class="text-zinc-600">></span> {{ step }}
                </div>
                {% endfor %}
            </div>
        </div>
        
        <div class="pt-2 text-[10px] font-mono text-zinc-600 text-right">
            TIMESTAMP: {{ provenance.timestamp }}
        </div>
    </div>
</div>
