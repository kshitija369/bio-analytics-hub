id: "EXP-001"
name: "Nocturnal Recovery Correlation"
hypothesis: "High-resolution nocturnal HRV dimensions correlate with aggregate readiness scores."
independent_variables:
  - dimension: "HRV"
    granularity: "1-minute"
    window:
      start_hour: 22
      end_hour: 8
dependent_variables:
  - dimension: "ReadinessScore"
    granularity: "daily_aggregate"
evaluation: "Pearson Correlation Coefficient"
