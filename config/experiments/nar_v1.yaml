id: "EXP-SRI-001"
name: "Sleep Recovery Index"
hypothesis: "Nightly physiological recovery trends directly predict next-day readiness scores."
independent_variables:
  - dimension: "Heart Rate Variability"
    window: "22:30-07:30"
  - dimension: "Resting Heart Rate"
    metric: "Deepest_Dip_Timing"
dependent_variables:
  - dimension: "Readiness Score"
    granularity: "daily_aggregate"
evaluation: "Baseline Comparison & Circadian Alignment"
