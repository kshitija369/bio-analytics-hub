name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: witness-monitoring
  REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies for testing
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest httpx fastapi uvicorn requests pyyaml tzlocal pytz

    - name: Run Integration Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m pytest tests/test_endpoints.py tests/test_parsing.py tests/test_auth.py

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        token_format: 'access_token' # Request an access token
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Login to Artifact Registry
      run: |-
        echo '${{ secrets.GCP_SA_KEY }}' | docker login -u _json_key --password-stdin https://${{ env.REGION }}-docker.pkg.dev

    - name: Build and Push Container
      run: |-
        docker build -t ${{ env.REGION }}-docker.pkg.dev/vertex-ai-api-453721/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/vertex-ai-api-453721/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |-
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.REGION }}-docker.pkg.dev/vertex-ai-api-453721/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --execution-environment gen2 \
          --timeout 300 \
          --memory 2Gi \
          --cpu 1 \
          --add-volume=name=somatic-db,type=cloud-storage,bucket=${{ secrets.GCS_BUCKET_NAME }} \
          --add-volume-mount=volume=somatic-db,mount-path=/app/data \
          --set-env-vars "PUSHOVER_USER_KEY=${{ secrets.PUSHOVER_USER_KEY }},PUSHOVER_API_TOKEN=${{ secrets.PUSHOVER_API_TOKEN }},OURA_PAT=${{ secrets.OURA_PAT }},USE_FHIR=true,USE_AGENTIC_ALERTS=true" \
          --update-labels=witness-state-monitoring=true
