name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: witness-monitoring
  REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        token_format: 'access_token' # Request an access token
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Build and Push Container
      run: |-
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |-
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/somatic-apps/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --execution-environment gen2 \
          --add-volume=name=somatic-db,type=cloud-storage,bucket=${{ secrets.GCS_BUCKET_NAME }} \
          --add-volume-mount=volume=somatic-db,mount-path=/app/data \
          --set-env-vars "PUSHOVER_USER_KEY=${{ secrets.PUSHOVER_USER_KEY }},PUSHOVER_API_TOKEN=${{ secrets.PUSHOVER_API_TOKEN }},OURA_PAT=${{ secrets.OURA_PAT }}" \
          --update-labels=witness-state-monitoring=true
